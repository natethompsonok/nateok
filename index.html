<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nate Thompson | Executive Creative Director</title>
    <style>
        /* Modern Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
              font-family: "DM Sans", sans-serif;
              font-optical-sizing: auto;
              font-weight: bold;
              font-style: normal;
            background-color: #0b0b0b;
            color: #f5f5f7;
            line-height: 1.6;
            overflow-x: hidden;
        }



        /* Full-Screen Video Background Wrapper */
        .video-background-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            background-color: #0b0b0b;
        }

        /* Force 16:9 Aspect Ratio to scale past screen bounds */
        .video-background-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; /* Given 16:9 width/height ratio */
            min-height: 100vh;
            min-width: 177.78vh; /* Given 16:9 height/width ratio */
            transform: translate(-50%, -50%);
            border: 0;
            pointer-events: none; /* Prevents users from clicking video controls */
        }

        /* Dark overlay to ensure text copy remains perfectly readable */
  

        .video-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Darkness reduced by 50% (Alpha channels changed from 0.75/0.9 to 0.375/0.45) */
    background: linear-gradient(180deg, rgba(11, 11, 11, 0.375) 0%, rgba(11, 11, 11, 0.45) 100%);
    z-index: -1;
}
        /* Content Container sitting above background */
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* Header Section */
        header {
            margin-top: 4rem;
            margin-bottom: 4rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: -0.0em;
            text-transform: uppercase;
            margin-bottom: 0rem;
        }
        .title-sub {
            font-size: 1.2rem;
            color: #86868b;
            font-weight: 400;
        }

        /* Snappy Narrative Copy */
        .intro-text {
            font-size: 1.2rem;
            font-weight: 200;
            letter-spacing: -0.02em;
            color: #ffffff;
            margin-bottom: 5rem;
        }

        hr {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin-bottom: 4rem;
        }

        /* About Section */
        .about-section {
            margin-bottom: 6rem;
        }
        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #86868b;
            margin-bottom: 1.5rem;
        }
        .about-content {
            font-size: 1.1rem;
            color: #e5e5ea;
        }
        .about-content p {
            margin-bottom: 1.5rem;
        }

        /* Contact & Footer Links */
        .links {
            margin-top: 2.5rem;
            display: flex;
            gap: 1.5rem;
        }
        .links a {
            color: #f5f5f7;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid #f5f5f7;
            padding-bottom: 2px;
            transition: color 0.2s, border-color 0.2s;
        }
        .links a:hover {
            color: #86868b;
            border-color: #86868b;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .intro-text { font-size: 1.3rem; }
            .container { padding: 2rem 1rem; }
            header { margin-top: 2rem; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>

    <div class="video-background-wrapper">
        <iframe src="https://player.vimeo.com/video/76979871?background=1&autoplay=1&loop=1&byline=0&title=0&muted=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="video-overlay"></div>

    <div class="container">
        
        <header>
            <h1>Nate Thompson</h1>
            <div class="title-sub">Executive Creative Director</div>
        </header>

        <section class="intro-text">
            <p>I lead the creative vision for multi-market brand experiences. Fusing a technical foundation with narrative-driven leadership , I help global brands design spaces and activations that foster genuine human community.</p>
        </section>
